<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--div - it is block level tag / 100% width of the space-->
    <div style="background-color: lightblue;">
        <h2>Menu</h2>
        <ol>
            <li>Pizza</li>
            <li>Coke</li>
        </ol>
    </div>
    <div style="background-color: bisque;">
        <h2>Review</h2>
        <strong>Good Restaurant</strong>
        <p>Sarah❤️❤️❤️❤️❤️</p>
    </div>
    <!--span tag- takes only required amount width/inline tag
    span tag can be added inside any other html tag -->
    <span style="background-color: brown;"><button>Login</button></span>
    <button>Cart <span>0</span>
    </button>
</body>
</html>
