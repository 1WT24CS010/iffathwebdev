<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .Box{
            background-color: blueviolet;
            height: 100px;
            width: 100px;
            color: white;
            margin: auto;
            transition: 3s;
        }
        /*Hover-when we move our mouse and it changes the style*/
        #Magic:hover{
            /*transform:scale(1.3);*/
            /*scale(1-original.change of size value)it is used to change the size of tag*/
            background-color: red;
            /*transform:rotate(360deg);*/
            /*transform:rotateX(360deg);*/
            /*transform:rotateY(360deg);*/
            /*transform:translateX(100px)*/
            transform:translateY(100px)
        }
    </style>
</head>
<body>
    <div class="Box" id="Magic">
        Box
    </div>
</body>
</html>
