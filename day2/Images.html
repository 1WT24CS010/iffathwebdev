<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Tag</title>
</head>
<body>
    <!-- Image Tag -Adding Image on webpage img tag src-"Copy address"source/location -->
     <!-- 1.from internet-copy image address and use it -->
      <!-- 1.pexels or unsplash -->
       <h2>Coffee</h2>
       <img src="https://images.pexels.com/photos/36183149/pexels-photo-36183149.jpeg"
        height="200" width="200">
        <hr>
        <!-- 2.download and add from your system -->
         <h2>Headphones</h2>
         <img src="headphone.avif" height="400" width="400"
         <hr>
         <h2>Bike</h2>
         <img src="bike.avif"
         <hr>
</body>
</html>
